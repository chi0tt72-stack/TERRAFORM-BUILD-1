# .gitlab-ci.yml with OIDC authentication
image:
  name: hashicorp/terraform:1.7
  entrypoint: [""]

variables:
  TF_ROOT: ${CI_PROJECT_DIR}/environments/dev
  TF_STATE_NAME: dev
  TF_ADDRESS: ${CI_API_V4_URL}/projects/79981965/terraform/state/${TF_STATE_NAME}
  AWS_DEFAULT_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::877833852920:role/GitLabTerraformRole

cache:
  key: "${TF_ROOT}"
  paths:
    - ${TF_ROOT}/.terraform
    - ${TF_ROOT}/.terraform.lock.hcl

stages:
  - validate
  - plan
  - apply
  - destroy

before_script:
  - cd ${TF_ROOT}
  - terraform --version
  - apk add --no-cache python3 py3-pip
  - pip3 install --break-system-packages --upgrade awscli
  - |
    if [ -n "$GITLAB_OIDC_TOKEN" ]; then
      JWT_TOKEN=$GITLAB_OIDC_TOKEN
    elif [ -n "$CI_JOB_JWT_V2" ]; then
      JWT_TOKEN=$CI_JOB_JWT_V2
    else
      echo "ERROR: No JWT token available"
      exit 1
    fi
  - |
    CREDENTIALS=$(aws sts assume-role-with-web-identity \
      --role-arn ${AWS_ROLE_ARN} \
      --role-session-name "GitLabRunner-${CI_PROJECT_ID}-${CI_PIPELINE_ID}" \
      --web-identity-token ${JWT_TOKEN} \
      --duration-seconds 3600 \
      --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
      --output text)
    export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s" $CREDENTIALS)
  - export TF_HTTP_ADDRESS=${TF_ADDRESS}
  - export TF_HTTP_LOCK_ADDRESS=${TF_ADDRESS}/lock
  - export TF_HTTP_UNLOCK_ADDRESS=${TF_ADDRESS}/lock
  - export TF_HTTP_USERNAME=gitlab-ci-token
  - export TF_HTTP_PASSWORD=${CI_JOB_TOKEN}
  - export TF_HTTP_LOCK_METHOD=POST
  - export TF_HTTP_UNLOCK_METHOD=DELETE
  - export TF_HTTP_RETRY_WAIT_MIN=5
  - terraform init

validate:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  stage: validate
  script:
    - terraform validate
    - terraform fmt -check -recursive
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

plan:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  stage: plan
  script:
    - terraform plan -out=plan.tfplan
    - terraform show -no-color plan.tfplan > plan.txt
    - terraform show -json plan.tfplan > plan.json
  artifacts:
    name: plan
    paths:
      - ${TF_ROOT}/plan.tfplan
      - ${TF_ROOT}/plan.txt
      - ${TF_ROOT}/plan.json
      - ${TF_ROOT}/.terraform/
      - ${TF_ROOT}/.terraform.lock.hcl
    reports:
      terraform: ${TF_ROOT}/plan.json
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

apply:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  stage: apply
  script:
    - terraform plan -out=plan.tfplan
    - terraform apply -auto-approve plan.tfplan
  dependencies:
    - plan
  when: manual
  only:
    - main
  environment:
    name: dev
    action: start

destroy:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  stage: destroy
  script:
    - terraform destroy -auto-approve
  when: manual
  only:
    - main
  environment:
    name: dev
    action: stop

